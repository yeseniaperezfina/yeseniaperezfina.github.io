<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="build-version" content="responsive-asset-set-2026-05-17-01" />
  <title>Yesenia Pérez · The Study</title>
  <meta name="description" content="A quiet threshold into Yesenia Pérez’s study, library, and professional archive." />
  <style>
    :root{
      --cream:#f7ead8;
      --amber:#d2a05d;
      --deep:#030302;
      --sans:ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
      --ease:cubic-bezier(.2,.8,.2,1);
    }

    *{box-sizing:border-box}
    html,body{margin:0;min-height:100%;background:var(--deep)}
    body{min-height:100svh;overflow:hidden;color:var(--cream)}

    .entry{position:relative;min-height:100svh;overflow:hidden;isolation:isolate;background:var(--deep)}
    .threshold-visual{position:absolute;inset:0;z-index:1;overflow:hidden;background:#050403}
    .threshold-visual img{width:100%;height:100%;object-fit:cover;object-position:center;display:block;filter:saturate(.98) contrast(1.02) brightness(.9);transition:filter .78s ease,transform .78s var(--ease)}
    .threshold-visual::after{content:"";position:absolute;inset:0;pointer-events:none;background:radial-gradient(ellipse at 50% 54%,transparent 0 52%,rgba(0,0,0,.22) 76%,rgba(0,0,0,.68) 100%),linear-gradient(90deg,rgba(0,0,0,.34),transparent 20%,transparent 80%,rgba(0,0,0,.34));transition:background .78s ease}

    .enter{position:absolute;left:50%;top:52%;z-index:10;transform:translate(-50%,-50%);color:rgba(247,234,216,.54);font-family:var(--sans);font-size:.58rem;font-weight:700;letter-spacing:.18em;text-transform:uppercase;text-decoration:none;border-bottom:1px solid rgba(210,160,93,.32);padding:0 0 .34rem;text-shadow:0 10px 30px rgba(0,0,0,.8);transition:color .28s ease,border-color .28s ease,opacity .34s ease,transform .34s ease}
    .enter:hover,.enter:focus-visible{color:var(--cream);border-color:rgba(210,160,93,.76);transform:translate(-50%,-50%) translateY(-1px);outline:none}
    .enter:focus-visible{box-shadow:0 2px 0 rgba(210,160,93,.24)}

    .entry.is-entering .threshold-visual img{filter:saturate(.94) contrast(1.04) brightness(.62) blur(1.4px);transform:scale(1.025)}
    .entry.is-entering .threshold-visual::after{background:radial-gradient(ellipse at 50% 54%,rgba(0,0,0,.10) 0 38%,rgba(0,0,0,.48) 74%,rgba(0,0,0,.84) 100%),linear-gradient(90deg,rgba(0,0,0,.46),transparent 18%,transparent 82%,rgba(0,0,0,.46))}
    .entry.is-entering .enter{opacity:0;transform:translate(-50%,-50%) scale(.96)}

    @media(prefers-reduced-motion:reduce){.threshold-visual img,.threshold-visual::after,.enter{transition:none!important}}
  </style>
</head>
<body>
  <main class="entry" aria-label="Threshold entrance to Yesenia Pérez’s study">
    <picture class="threshold-visual" aria-hidden="true">
      <source srcset="assets/img-asset-threshold-9x16.png?v=responsive-asset-set-2026-05-17-01" media="(max-aspect-ratio: 2/3)" />
      <source srcset="assets/img-asset-threshold-3x4.png?v=responsive-asset-set-2026-05-17-01" media="(max-aspect-ratio: 4/5)" />
      <source srcset="assets/img-asset-threshold-1x1.png?v=responsive-asset-set-2026-05-17-01" media="(max-aspect-ratio: 5/4)" />
      <source srcset="assets/img-asset-threshold-4x3.png?v=responsive-asset-set-2026-05-17-01" media="(max-aspect-ratio: 3/2)" />
      <img src="assets/img-asset-threshold-16x9.png?v=responsive-asset-set-2026-05-17-01" alt="" decoding="async" fetchpriority="high" />
    </picture>

    <a class="enter" href="library.html" aria-label="Enter the study library">enter</a>
  </main>

  <script>
    (() => {
      const entry = document.querySelector('.entry');
      const enter = document.querySelector('.enter');
      const reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
      if (!entry || !enter || reduceMotion) return;
      enter.addEventListener('click', (event) => {
        event.preventDefault();
        entry.classList.add('is-entering');
        try { sessionStorage.setItem('entered-from-study', 'true'); } catch {}
        window.setTimeout(() => { window.location.href = enter.href; }, 640);
      });
    })();
  </script>
</body>
</html>
