<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Yesenia Pérez · The Stained Glass Study</title>
  <meta name="description" content="A gothic stained-glass entrance into Yesenia Pérez’s study of public learning systems, institutional strategy, science engagement, and research." />
  <style>
    :root{
      --ink:#f8eddc;
      --gold:#d3a85d;
      --stone:#17120e;
      --deep:#050403;
      --light-x:50%;
      --light-y:42%;
      --serif: Georgia, 'Times New Roman', serif;
      --sans: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }
    *{box-sizing:border-box}
    html,body{margin:0;min-height:100%;background:var(--deep)}
    body{
      min-height:100svh;
      overflow:hidden;
      color:var(--ink);
      font-family:var(--serif);
      background:
        radial-gradient(circle at 50% 44%, rgba(155,98,49,.24), transparent 35rem),
        radial-gradient(circle at 50% 8%, rgba(38,42,62,.38), transparent 28rem),
        linear-gradient(180deg,#060504 0%,#17110c 56%,#050403 100%);
    }
    .portal-page{
      position:relative;
      min-height:100svh;
      display:grid;
      place-items:center;
      isolation:isolate;
      perspective:1600px;
    }
    .portal-page::before{
      content:"";
      position:absolute;
      inset:0;
      z-index:4;
      pointer-events:none;
      background:
        radial-gradient(circle at var(--light-x) var(--light-y), rgba(255,245,215,.16), transparent 12rem),
        radial-gradient(ellipse at 50% 50%, transparent 0 48%, rgba(0,0,0,.28) 70%, rgba(0,0,0,.78) 100%),
        linear-gradient(90deg, rgba(0,0,0,.58), transparent 22%, transparent 78%, rgba(0,0,0,.58));
    }
    .portal-shell{
      position:relative;
      width:min(94vw,1480px);
      height:min(90svh,860px);
      transform:translateZ(-40px);
      filter:drop-shadow(0 44px 100px rgba(0,0,0,.72));
    }
    .portal-svg{display:block;width:100%;height:100%}
    .enter-link{
      position:absolute;
      left:50%;top:52%;
      z-index:8;
      transform:translate(-50%,-50%);
      text-decoration:none;
      color:rgba(255,245,224,.84);
      font-family:var(--serif);
      font-size:.94rem;
      letter-spacing:.2em;
      text-transform:lowercase;
      padding:.82rem 1.34rem;
      border:1px solid rgba(225,185,105,.45);
      border-radius:999px;
      background:rgba(10,7,5,.36);
      box-shadow:0 15px 48px rgba(0,0,0,.62), inset 0 1px 0 rgba(255,255,255,.12);
      backdrop-filter:blur(9px) saturate(.9);
      transition:transform .35s ease, border-color .35s ease, background .35s ease, color .35s ease;
    }
    .enter-link::before{
      content:"";
      position:absolute;
      left:50%;top:-25vh;
      width:1px;height:23vh;
      background:linear-gradient(transparent,rgba(225,185,105,.5));
    }
    .enter-link::after{
      content:"";
      position:absolute;
      left:50%;top:-26vh;
      width:.46rem;height:.46rem;
      border-radius:50%;
      border:1px solid rgba(225,185,105,.48);
      transform:translateX(-50%);
      box-shadow:0 0 24px rgba(225,185,105,.28);
    }
    .enter-link:hover,.enter-link:focus-visible{
      transform:translate(-50%,-50%) scale(1.045);
      border-color:rgba(225,185,105,.8);
      background:rgba(68,42,22,.5);
      color:#fff8e9;
      outline:none;
    }
    .caption{
      position:absolute;
      right:clamp(1rem,3vw,2.6rem);
      bottom:clamp(1rem,2.4vw,2rem);
      z-index:7;
      font-family:var(--sans);
      font-size:.6rem;
      letter-spacing:.18em;
      text-transform:uppercase;
      color:rgba(248,237,220,.34);
      pointer-events:none;
    }
    @media(max-width:880px){
      .portal-shell{width:98vw;height:82svh}
      .enter-link{font-size:.84rem}
      .enter-link::before,.enter-link::after,.caption{display:none}
    }
    @media(prefers-reduced-motion:reduce){.enter-link{transition:none}}
  </style>
</head>
