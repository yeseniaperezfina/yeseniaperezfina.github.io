<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Yesenia Pérez · The Study</title>
  <meta name="description" content="A dark academia stained-glass entrance into Yesenia Pérez’s study of public learning systems, institutional strategy, science engagement, and research." />
  <style>
    :root{
      --ink:#f6ead6;
      --gold:#d7a85a;
      --shadow:#050403;
      --light-x:50%;
      --light-y:42%;
      --serif: Georgia, 'Times New Roman', serif;
      --sans: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }
    *{box-sizing:border-box}
    html,body{margin:0;min-height:100%;background:#050403}
    body{
      min-height:100svh;
      overflow:hidden;
      color:var(--ink);
      font-family:var(--serif);
      background:
        radial-gradient(circle at 50% 34%, rgba(119,72,36,.32), transparent 34rem),
        radial-gradient(circle at 76% 18%, rgba(57,43,74,.22), transparent 26rem),
        linear-gradient(180deg,#050403 0%,#15100b 50%,#060403 100%);
    }
    .threshold{
      position:relative;
      min-height:100svh;
      display:grid;
      place-items:center;
      overflow:hidden;
      isolation:isolate;
      perspective:1800px;
    }
    .threshold::before{
      content:"";
      position:absolute;
      inset:0;
      z-index:3;
      pointer-events:none;
      background:
        radial-gradient(circle at var(--light-x) var(--light-y), rgba(255,242,215,.15), transparent 12rem),
        radial-gradient(ellipse at 50% 56%, transparent 0 52%, rgba(0,0,0,.42) 73%, rgba(0,0,0,.86) 100%),
        linear-gradient(90deg, rgba(0,0,0,.66), transparent 20%, transparent 80%, rgba(0,0,0,.66));
      mix-blend-mode:normal;
    }
    .threshold::after{
      content:"";
      position:absolute;
      inset:0;
      z-index:4;
      pointer-events:none;
      background:linear-gradient(115deg, transparent 0 22%, rgba(255,255,255,.08) 24%, transparent 30% 61%, rgba(255,255,255,.045) 64%, transparent 72%);
      opacity:.55;
    }
    .scene{
      position:relative;
      width:min(96vw,1440px);
      height:min(94svh,920px);
      filter:drop-shadow(0 48px 120px rgba(0,0,0,.78));
      transform:translateZ(-55px);
    }
    svg{display:block;width:100%;height:100%}
    .enter{
      position:absolute;
      left:50%;
      bottom:7.5%;
      z-index:8;
      transform:translateX(-50%);
      text-decoration:none;
      color:rgba(255,244,223,.82);
      font-family:var(--serif);
      font-size:.92rem;
      letter-spacing:.22em;
      text-transform:lowercase;
      padding:.76rem 1.24rem;
      border:1px solid rgba(221,176,95,.42);
      border-radius:999px;
      background:rgba(13,8,5,.48);
      box-shadow:0 18px 50px rgba(0,0,0,.65), inset 0 1px 0 rgba(255,255,255,.10);
      backdrop-filter:blur(9px) saturate(.9);
      transition:transform .32s ease,border-color .32s ease,background .32s ease,color .32s ease;
    }
    .enter:hover,.enter:focus-visible{
      transform:translateX(-50%) scale(1.045);
      color:#fff8eb;
      border-color:rgba(221,176,95,.78);
      background:rgba(72,43,21,.58);
      outline:none;
    }
    .caption{
      position:absolute;
      right:clamp(1rem,3vw,2.5rem);
      bottom:clamp(.9rem,2vw,1.8rem);
      z-index:6;
      font-family:var(--sans);
      font-size:.58rem;
      letter-spacing:.18em;
      text-transform:uppercase;
      color:rgba(246,234,214,.35);
      pointer-events:none;
    }
    @media(max-width:860px){
      .scene{width:100vw;height:86svh}
      .enter{bottom:5%;font-size:.84rem}
      .caption{display:none}
    }
    @media(prefers-reduced-motion:reduce){.enter{transition:none}}
  </style>
</head>
<body>
  <main class="threshold" aria-label="Entrance to Yesenia Pérez’s study">

          <radialGradient id="goldGlass" cx="38%" cy="25%" r="88%"><stop offset="0" stop-color="#fff0a3"/><stop offset=".36" stop-color="#ffc13f"/><stop offset=".74" stop-color="#c35d1c"/><stop offset="1" stop-color="#47160c"/></radialGradient>
          <radialGradient id="redGlass" cx="40%" cy="25%" r="86%"><stop offset="0" stop-color="#ff9d72"/><stop offset=".36" stop-color="#e84b3f"/><stop offset=".72" stop-color="#8c1d2a"/><stop offset="1" stop-color="#2d0814"/></radialGradient>
