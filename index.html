<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Yesenia Pérez · The Study</title>
  <meta name="description" content="A quiet academic study entrance into Yesenia Pérez’s work on public learning systems, institutional strategy, science engagement, and research." />
  <style>
    :root{
      --ink:#f5ead7;
      --muted:#c8b89f;
      --gold:#d2a65c;
      --dark:#070604;
      --oak:#5c351c;
      --light-x:50%;
      --light-y:42%;
      --serif: Georgia, 'Times New Roman', serif;
      --sans: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }
    *{box-sizing:border-box}
    html,body{margin:0;min-height:100%;background:var(--dark);}
    body{
      min-height:100svh;
      overflow:hidden;
      color:var(--ink);
      background:
        radial-gradient(circle at 50% 42%, rgba(174,116,58,.22), transparent 36rem),
        radial-gradient(circle at 18% 18%, rgba(76,45,24,.38), transparent 24rem),
        linear-gradient(180deg,#090705 0%,#17100a 54%,#050403 100%);
      font-family:var(--serif);
    }
    .entry-shell{
      position:relative;
      min-height:100svh;
      display:grid;
      place-items:center;
      isolation:isolate;
      perspective:1400px;
    }
    .entry-shell::before{
      content:"";
      position:absolute;
      inset:0;
      z-index:5;
      pointer-events:none;
      background:
        radial-gradient(circle at var(--light-x) var(--light-y), rgba(255,246,222,.11), transparent 13rem),
        radial-gradient(ellipse at 50% 50%, transparent 0 54%, rgba(0,0,0,.36) 76%, rgba(0,0,0,.74) 100%),
        linear-gradient(90deg, rgba(0,0,0,.56), transparent 18%, transparent 82%, rgba(0,0,0,.56));
    }
    .study-frame{
      position:relative;
      width:min(94vw,1500px);
      height:min(86svh,840px);
      border-radius:22px;
      overflow:hidden;
      background:#0d0a07;
      box-shadow:
        0 48px 150px rgba(0,0,0,.78),
        0 0 0 1px rgba(233,207,161,.16),
        inset 0 0 120px rgba(0,0,0,.2);
      transform:translateZ(-50px);
    }
    .study-svg{
      display:block;
      width:100%;
      height:100%;
      filter:saturate(.94) sepia(.05);
    }
    .glass{
      position:absolute;
      inset:clamp(.8rem,1.8vw,1.6rem);
      z-index:4;
      border-radius:18px;
      border:1px solid rgba(244,226,187,.35);
      background:
        radial-gradient(circle at var(--light-x) var(--light-y), rgba(255,247,226,.15), transparent 12rem),
        linear-gradient(112deg, transparent 0 17%, rgba(255,255,255,.12) 20%, transparent 25% 58%, rgba(255,255,255,.07) 62%, transparent 70%),
        rgba(226,241,245,.045);
      backdrop-filter:blur(2.2px) saturate(.86);
      box-shadow:
        inset 0 0 78px rgba(255,255,255,.04),
        0 0 0 14px rgba(52,35,22,.28),
        0 0 0 30px rgba(90,61,38,.10),
        0 34px 120px rgba(0,0,0,.62);
      pointer-events:none;
    }
    .glass::before{
      content:"";
      position:absolute;
      inset:0;
      border-radius:inherit;
      background:
        linear-gradient(90deg, transparent 24.9%, rgba(244,226,187,.16) 25%, transparent 25.15%, transparent 49.9%, rgba(244,226,187,.30) 50%, transparent 50.15%, transparent 74.9%, rgba(244,226,187,.16) 75%, transparent 75.15%),
        linear-gradient(0deg, transparent 24.9%, rgba(244,226,187,.12) 25%, transparent 25.15%, transparent 49.9%, rgba(244,226,187,.17) 50%, transparent 50.15%, transparent 74.9%, rgba(244,226,187,.11) 75%, transparent 75.15%);
    }
    .glass::after{
      content:"";
      position:absolute;
      inset:2.2rem;
      border:1px solid rgba(244,226,187,.12);
      border-radius:12px;
    }
    .enter-link{
      position:absolute;
      left:50%;top:51.5%;
      z-index:7;
      transform:translate(-50%,-50%);
      text-decoration:none;
      color:rgba(249,239,219,.82);
      font-family:var(--serif);
      font-size:.92rem;
      letter-spacing:.18em;
      text-transform:lowercase;
      padding:.78rem 1.26rem;
      border:1px solid rgba(210,166,92,.36);
      border-radius:999px;
      background:rgba(14,10,7,.34);
      box-shadow:0 12px 44px rgba(0,0,0,.54), inset 0 1px 0 rgba(255,255,255,.08);
      backdrop-filter:blur(8px);
      transition:transform .35s ease, border-color .35s ease, background .35s ease;
    }
    .enter-link::before{
      content:"";
      position:absolute;
      left:50%;top:-25vh;
      width:1px;height:23vh;
      background:linear-gradient(transparent,rgba(210,166,92,.42));
    }
    .enter-link::after{
      content:"";
      position:absolute;
      left:50%;top:-26vh;
      width:.42rem;height:.42rem;
      border-radius:50%;
      border:1px solid rgba(210,166,92,.44);
      transform:translateX(-50%);
      box-shadow:0 0 20px rgba(210,166,92,.22);
    }
    .enter-link:hover,.enter-link:focus-visible{
      transform:translate(-50%,-50%) scale(1.045);
      border-color:rgba(210,166,92,.68);
      background:rgba(82,51,27,.48);
      outline:none;
    }
    .quiet-label{
      position:absolute;
      right:clamp(1.2rem,3vw,3rem);
      bottom:clamp(1rem,2vw,2rem);
      z-index:6;
      font-family:var(--sans);
      font-size:.62rem;
      letter-spacing:.18em;
      text-transform:uppercase;
      color:rgba(245,234,215,.36);
      pointer-events:none;
    }
    @media(max-width:860px){
      .study-frame{width:96vw;height:76svh;}
      .glass{inset:.7rem;}
      .enter-link{font-size:.84rem;}
      .enter-link::before,.enter-link::after{display:none;}
      .quiet-label{display:none;}
    }
    @media(prefers-reduced-motion:reduce){.enter-link{transition:none}}
  </style>
</head>
