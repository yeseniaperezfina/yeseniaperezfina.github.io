<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Yesenia Pérez · The Study</title>
  <meta name="description" content="A restrained amber fogged-glass sliding door entrance into Yesenia Pérez’s study, library, and professional archive." />
  <style>
    :root{
      --ink:#f6ecdc;
      --muted:#b7aa96;
      --amber:#d4a15d;
      --green:#8fb56d;
      --deep:#030302;
      --wood:#3b2112;
      --serif: Georgia, 'Times New Roman', serif;
      --sans: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }
    *{box-sizing:border-box}
    html,body{margin:0;min-height:100%;background:var(--deep)}
    body{
      min-height:100svh;
      overflow:hidden;
      color:var(--ink);
      font-family:var(--serif);
      background:
        radial-gradient(circle at 50% 22%, rgba(111,77,45,.18), transparent 30rem),
        radial-gradient(circle at 72% 42%, rgba(204,138,72,.11), transparent 24rem),
        linear-gradient(180deg,#030302 0%,#090604 55%,#020201 100%);
    }
    .entry{
      min-height:100svh;
      display:grid;
      place-items:center;
      position:relative;
      overflow:hidden;
      isolation:isolate;
      perspective:1800px;
    }
    .entry::before{
      content:"";
      position:absolute;
      inset:0;
      pointer-events:none;
      z-index:20;
      background:
        radial-gradient(ellipse at 50% 52%, transparent 0 52%, rgba(0,0,0,.38) 76%, rgba(0,0,0,.88) 100%),
        linear-gradient(90deg, rgba(0,0,0,.72), transparent 24%, transparent 76%, rgba(0,0,0,.72));
    }
    .threshold{
      position:relative;
      width:min(86vw,1120px);
      height:min(92svh,820px);
      border-radius:2px;
      transform:translateZ(-40px);
      background:#070403;
      box-shadow:
        0 60px 180px rgba(0,0,0,.86),
        0 0 0 1px rgba(220,185,126,.10),
        0 0 0 28px rgba(18,11,7,.36);
      overflow:hidden;
    }
    .room{
      position:absolute;
      inset:0;
      overflow:hidden;
      background:
        radial-gradient(circle at 35% 52%, rgba(128,175,95,.12), transparent 13rem),
        radial-gradient(circle at 57% 44%, rgba(221,151,79,.18), transparent 18rem),
        linear-gradient(180deg,#111612 0%,#12120d 44%,#0a0503 100%);
      filter:saturate(.85) sepia(.14);
    }
    .rear-wall{
      position:absolute;
      inset:0;
      background:
        linear-gradient(90deg, rgba(13,7,4,.96) 0 14%, transparent 26% 74%, rgba(13,7,4,.96) 86% 100%),
        repeating-linear-gradient(90deg, rgba(255,235,190,.025) 0 1px, transparent 1px 122px),
        linear-gradient(180deg, rgba(22,30,25,.56), rgba(42,27,16,.32) 62%, rgba(0,0,0,.22));
    }
    .rear-wall::after{
      content:"";
      position:absolute;
      left:49%;top:0;bottom:0;width:1px;
      background:rgba(255,225,176,.05);
      box-shadow:-18rem 0 rgba(255,225,176,.035),18rem 0 rgba(255,225,176,.035);
    }
    .side-depth-left,.side-depth-right{
      position:absolute;
      top:0;bottom:0;width:18%;
      background:linear-gradient(90deg, rgba(0,0,0,.72), rgba(74,43,22,.35), rgba(0,0,0,.08));
      transform-origin:center;
    }
    .side-depth-left{left:0;clip-path:polygon(0 0,100% 8%,100% 92%,0 100%)}
    .side-depth-right{right:0;transform:scaleX(-1);clip-path:polygon(0 0,100% 8%,100% 92%,0 100%)}
    .floor{
      position:absolute;
      left:-10%;right:-10%;bottom:-8%;height:34%;
      background:linear-gradient(180deg,#5f341a,#251106 74%,#060302);
      clip-path:polygon(17% 0,83% 0,100% 100%,0 100%);
      box-shadow:inset 0 1px 0 rgba(230,163,82,.18),0 -24px 90px rgba(0,0,0,.48);
    }
    .floor::before{
      content:"";
      position:absolute;
      inset:0;
      background:
        linear-gradient(90deg, transparent 49.9%, rgba(255,225,176,.07) 50%, transparent 50.1%),
        repeating-linear-gradient(90deg, transparent 0 150px, rgba(255,225,176,.034) 151px 152px),
        linear-gradient(180deg, rgba(230,160,78,.07), transparent 55%);
    }
    .book-wall{
      position:absolute;
      left:10%;top:12%;width:25%;height:58%;
      background:linear-gradient(90deg,#160905,#5b3219 20%,#241108 100%);
      border:1px solid rgba(199,132,65,.42);
      box-shadow:inset 0 0 46px rgba(0,0,0,.68),0 24px 70px rgba(0,0,0,.45);
      transform:perspective(900px) rotateY(1.5deg);
      filter:blur(.2px);
    }
    .book-wall::before{
      content:"";
      position:absolute;
      inset:7% 8%;
      background:
        repeating-linear-gradient(90deg,#2a3440 0 9px,#8f552b 9px 19px,#1f2934 19px 28px,#b06a34 28px 40px,#3a473d 40px 49px,#61331d 49px 62px),
        linear-gradient(180deg,transparent 0 25%,rgba(226,146,70,.20) 25.4% 26.3%,transparent 26.8% 51%,rgba(226,146,70,.16) 51.4% 52.3%,transparent 52.8% 77%,rgba(226,146,70,.12) 77.4% 78.3%,transparent 78.8%);
      opacity:.78;
    }
    .cat{
      position:absolute;
      left:27%;top:24%;width:4.8rem;height:2.8rem;
      opacity:.72;
      filter:blur(.15px);
    }
    .cat::before{
      content:"";
      position:absolute;
      left:0;bottom:0;width:3.6rem;height:1.5rem;
      border-radius:999px 999px 45% 45%;
      background:#050403;
      box-shadow:0 15px 22px rgba(0,0,0,.36);
    }
    .cat::after{
      content:"";
      position:absolute;
      right:0;top:.05rem;width:2.7rem;height:2.1rem;
      border:8px solid #050403;
      border-left:0;border-bottom:0;border-radius:0 999px 0 0;
      transform:rotate(16deg);
    }
    .depth-bay{
      position:absolute;
      right:10%;top:11%;width:28%;height:56%;
      border:1px solid rgba(205,140,73,.18);
      background:
        radial-gradient(circle at 48% 38%, rgba(226,157,83,.18), transparent 11rem),
        linear-gradient(90deg,rgba(0,0,0,.58),transparent 22%,transparent 78%,rgba(0,0,0,.58)),
        linear-gradient(180deg,#151c18,#0c0704);
      box-shadow:inset 0 0 90px rgba(0,0,0,.62),0 20px 70px rgba(0,0,0,.30);
      opacity:.58;
      filter:blur(1.6px);
    }
    .depth-bay::after{
      content:"";
      position:absolute;
      right:16%;bottom:0;width:45%;height:48%;
      border-radius:50% 50% 0 0;
      background:rgba(5,4,3,.72);
      filter:blur(8px);
    }
    .desk-line{
      position:absolute;
      left:24%;right:18%;bottom:20%;height:4px;
      background:linear-gradient(90deg,transparent,rgba(224,142,67,.50),transparent);
      box-shadow:0 18px 44px rgba(0,0,0,.60);
    }
    .lamp-aura{
      position:absolute;
      left:28%;bottom:27%;width:34%;height:40%;
      border-radius:50%;
      background:radial-gradient(circle,rgba(145,255,107,.18),rgba(145,255,107,.07) 32%,transparent 68%);
      filter:blur(24px);
    }
    .lamp{
      position:absolute;
      left:38%;bottom:31%;width:13%;height:24%;
      filter:drop-shadow(0 18px 28px rgba(0,0,0,.42));
    }
    .lamp::before{
      content:"";
      position:absolute;
      left:12%;top:0;width:76%;height:30%;
      border-radius:999px 999px 18px 18px;
      background:linear-gradient(180deg,#c5ec94,#4b7b38 60%,#162c11);
      box-shadow:0 0 40px rgba(144,255,105,.28),inset 0 6px 14px rgba(255,255,255,.24);
    }
    .lamp::after{
      content:"";
      position:absolute;
      left:49%;top:28%;width:5%;height:60%;
      background:linear-gradient(180deg,#dfa75a,#61401f);
      box-shadow:-1.25rem 5rem 0 .30rem #b77a35,1.25rem 5rem 0 .30rem #b77a35;
    }
    .glass-system{
      position:absolute;
      inset:0;
      z-index:8;
      pointer-events:none;
    }
    .track-top,.track-bottom{
      position:absolute;
      left:7%;right:7%;height:6px;
      border-radius:999px;
      background:linear-gradient(90deg,transparent,rgba(229,188,125,.32),transparent);
      box-shadow:0 1px 0 rgba(255,255,255,.08);
    }
    .track-top{top:5.7%}.track-bottom{bottom:6%}
    .door{
      position:absolute;
      top:7%;bottom:7%;width:49%;
      border:1px solid rgba(238,205,150,.32);
      background:
        radial-gradient(circle at 50% 42%,rgba(255,240,205,.16),transparent 13rem),
        linear-gradient(112deg,transparent 0 18%,rgba(255,255,255,.13) 21%,transparent 27% 60%,rgba(255,255,255,.07) 65%,transparent 73%),
        repeating-linear-gradient(45deg,rgba(255,255,255,.023) 0 1px,transparent 1px 9px),
        rgba(216,185,138,.14);
      backdrop-filter:blur(10px) saturate(.68);
      box-shadow:
        inset 0 0 84px rgba(255,255,255,.04),
        inset 0 1px 0 rgba(255,255,255,.08),
        0 30px 82px rgba(0,0,0,.32);
    }
    .door::before{
      content:"";
      position:absolute;inset:1.1rem;
      border:1px solid rgba(255,238,201,.12);
    }
    .door-left{left:4%;transform:translateX(-9.2%) perspective(1000px) rotateY(-3deg)}
    .door-right{right:4%;transform:translateX(12.5%) perspective(1000px) rotateY(4.5deg);opacity:.92}
    .door-left::after,.door-right::after{
      content:"";position:absolute;top:0;bottom:0;width:1px;background:rgba(255,234,194,.30);
    }
    .door-left::after{right:1.6rem}.door-right::after{left:1.6rem}
    .opening{
      position:absolute;
      top:7%;bottom:7%;left:50%;width:11%;
      transform:translateX(-50%);
      background:linear-gradient(90deg,rgba(0,0,0,.36),rgba(214,146,70,.16),rgba(0,0,0,.40));
      box-shadow:inset 12px 0 26px rgba(0,0,0,.34),inset -12px 0 26px rgba(0,0,0,.32);
      opacity:.96;
    }
    .handle{
      position:absolute;left:52.3%;top:50%;width:.55rem;height:5rem;
      transform:translate(-50%,-50%);
      border-radius:999px;
      background:linear-gradient(180deg,rgba(248,228,190,.78),rgba(116,80,42,.52));
      box-shadow:0 0 24px rgba(236,190,110,.14);
    }
    .enter{
      position:absolute;
      left:50%;top:52%;z-index:18;
      transform:translate(-50%,-50%);
      text-decoration:none;
      color:rgba(255,247,230,.88);
      font-family:var(--serif);
      font-size:.9rem;
      letter-spacing:.2em;
      text-transform:lowercase;
      padding:.82rem 1.28rem;
      border:1px solid rgba(220,174,94,.50);
      border-radius:999px;
      background:rgba(10,7,4,.38);
      box-shadow:0 18px 56px rgba(0,0,0,.66),inset 0 1px 0 rgba(255,255,255,.12);
      backdrop-filter:blur(10px) saturate(.85);
      transition:transform .32s ease,border-color .32s ease,background .32s ease,color .32s ease;
    }
    .enter::before{content:"";position:absolute;left:50%;top:-23vh;width:1px;height:21vh;background:linear-gradient(transparent,rgba(220,174,94,.44))}
    .enter::after{content:"";position:absolute;left:50%;top:-24vh;width:.42rem;height:.42rem;border-radius:50%;border:1px solid rgba(220,174,94,.44);transform:translateX(-50%);box-shadow:0 0 22px rgba(220,174,94,.26)}
    .enter:hover,.enter:focus-visible{transform:translate(-50%,-50%) scale(1.045);border-color:rgba(220,174,94,.82);background:rgba(76,45,22,.50);color:#fff9ee;outline:none}
    .caption{position:absolute;right:clamp(1rem,3vw,2.4rem);bottom:clamp(.8rem,2vw,1.6rem);z-index:18;font-family:var(--sans);font-size:.58rem;letter-spacing:.18em;text-transform:uppercase;color:rgba(246,234,214,.32);pointer-events:none}
    @media(max-width:900px){.threshold{width:94vw;height:82svh}.book-wall{left:7%;width:30%}.cat{left:31%}.depth-bay{right:7%;width:33%}.lamp{left:34%;width:17%}.door{top:6%;bottom:6%;width:50%}.door-left{left:1%;transform:translateX(-7%) perspective(1000px) rotateY(-3deg)}.door-right{right:1%;transform:translateX(11%) perspective(1000px) rotateY(5deg)}.enter{font-size:.84rem}.enter::before,.enter::after,.caption{display:none}}
    @media(max-width:620px){.threshold{height:74svh}.book-wall{width:38%;opacity:.86}.depth-bay{opacity:.42}.lamp{left:30%;width:24%}.opening{width:14%}}
    @media(prefers-reduced-motion:reduce){.enter{transition:none}}
  </style>
</head>
<body>
  <main class="entry" aria-label="Amber fogged-glass entrance to Yesenia Pérez’s study">
    <section class="threshold" aria-hidden="true">
      <div class="room">
        <div class="rear-wall"></div>
        <div class="side-depth-left"></div>
        <div class="side-depth-right"></div>
        <div class="book-wall"></div>
        <div class="cat"></div>
        <div class="depth-bay"></div>
        <div class="desk-line"></div>
        <div class="lamp-aura"></div>
        <div class="lamp"></div>
        <div class="floor"></div>
      </div>
      <div class="glass-system">
        <div class="track-top"></div>
        <div class="track-bottom"></div>
        <div class="opening"></div>
        <div class="door door-left"></div>
        <div class="door door-right"></div>
        <div class="handle"></div>
      </div>
    </section>
    <a class="enter" href="library.html" aria-label="Enter the study library">enter</a>
    <div class="caption" aria-hidden="true">amber glass / study threshold</div>
  </main>
  <script src="assets/js/library.js" defer></script>
</body>
</html>
