<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="build-version" content="threshold-elegant-glow-2026-05-17-01" />
  <title>Yesenia Pérez · The Study</title>
  <meta name="description" content="A quiet threshold into Yesenia Pérez’s study, library, and professional archive." />
  <style>
    :root{
      --cream:#f7ead8;
      --amber:#d2a05d;
      --moonblue:#c9f4ff;
      --deep:#030302;
      --sans:ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
      --ease:cubic-bezier(.2,.8,.2,1);
    }

    *{box-sizing:border-box}
    html,body{margin:0;min-height:100%;background:var(--deep)}
    body{min-height:100svh;overflow:hidden;color:var(--cream)}

    .entry{position:relative;min-height:100svh;overflow:hidden;isolation:isolate;background:var(--deep)}
    .threshold-visual{position:absolute;inset:0;z-index:1;overflow:hidden;background:#050403}
    .threshold-visual img{width:100%;height:100%;object-fit:cover;object-position:center;display:block;filter:saturate(.98) contrast(1.02) brightness(.9);transition:filter .78s ease,transform .78s var(--ease)}
    .threshold-visual::after{content:"";position:absolute;inset:0;pointer-events:none;background:radial-gradient(circle at 49% 51%,rgba(201,244,255,.09),transparent 11rem),radial-gradient(circle at 50% 52%,rgba(255,218,150,.045),transparent 18rem),radial-gradient(ellipse at 50% 54%,transparent 0 52%,rgba(0,0,0,.22) 76%,rgba(0,0,0,.68) 100%),linear-gradient(90deg,rgba(0,0,0,.34),transparent 20%,transparent 80%,rgba(0,0,0,.34));transition:background .78s ease}

    .enter{position:absolute;left:49%;top:51%;z-index:10;transform:translate(-50%,-50%);color:rgba(247,254,255,.88);font-family:var(--sans);font-size:.88rem;font-weight:850;letter-spacing:.25em;text-transform:uppercase;text-decoration:none;padding:.38rem .28rem .56rem;text-shadow:0 0 16px rgba(201,244,255,.72),0 0 34px rgba(201,244,255,.28),0 2px 10px rgba(0,0,0,.96);transition:color .28s ease,opacity .34s ease,transform .34s ease,text-shadow .28s ease}
    .enter::before{content:"";position:absolute;left:50%;right:50%;bottom:.16rem;height:1px;background:linear-gradient(90deg,transparent,rgba(247,254,255,.98),rgba(201,244,255,.72),rgba(210,160,93,.24),transparent);box-shadow:0 0 16px rgba(201,244,255,.78),0 0 42px rgba(201,244,255,.30);transition:left .34s var(--ease),right .34s var(--ease),opacity .34s ease;opacity:.9}
    .enter::after{content:"";position:absolute;left:50%;top:50%;width:10rem;height:3rem;border-radius:999px;background:radial-gradient(ellipse at 50% 50%,rgba(201,244,255,.20),rgba(201,244,255,.08) 42%,transparent 72%);transform:translate(-50%,-50%) scale(.9);filter:blur(9px);opacity:.62;z-index:-1;transition:opacity .34s ease,transform .34s var(--ease)}
    .enter:hover,.enter:focus-visible{color:#ffffff;transform:translate(-50%,-50%) translateY(-1px);outline:none;text-shadow:0 0 20px rgba(247,254,255,.88),0 0 44px rgba(201,244,255,.42),0 2px 10px rgba(0,0,0,.96)}
    .enter:hover::before,.enter:focus-visible::before{left:-.85rem;right:-.85rem;opacity:1}
    .enter:hover::after,.enter:focus-visible::after{opacity:.98;transform:translate(-50%,-50%) scale(1.06)}

    .letterhead{position:absolute;right:clamp(1rem,2vw,2rem);bottom:clamp(.9rem,1.6vw,1.35rem);z-index:10;text-align:right;font-family:var(--sans);text-transform:uppercase;letter-spacing:.17em;color:rgba(201,244,255,.50);text-shadow:0 0 12px rgba(201,244,255,.34),0 0 28px rgba(201,244,255,.14),0 8px 26px rgba(0,0,0,.86);pointer-events:none}
    .letterhead strong{display:block;font-size:.66rem;letter-spacing:.2em;color:rgba(247,254,255,.78);font-weight:850}.letterhead span{display:block;margin-top:.24rem;font-size:.5rem;letter-spacing:.21em;color:rgba(201,244,255,.52)}

    .entry.is-entering .threshold-visual img{filter:saturate(.94) contrast(1.04) brightness(.62) blur(1.4px);transform:scale(1.025)}
    .entry.is-entering .threshold-visual::after{background:radial-gradient(ellipse at 50% 54%,rgba(0,0,0,.10) 0 38%,rgba(0,0,0,.48) 74%,rgba(0,0,0,.84) 100%),linear-gradient(90deg,rgba(0,0,0,.46),transparent 18%,transparent 82%,rgba(0,0,0,.46))}
    .entry.is-entering .enter{opacity:0;transform:translate(-50%,-50%) scale(.96)}
    .entry.is-entering .letterhead{opacity:0}

    @media(max-width:900px){.enter{left:50%;top:54%;font-size:.82rem}.letterhead strong{font-size:.62rem}}
    @media(max-width:640px){.letterhead{display:none}.enter{top:56%;font-size:.78rem}}
    @media(prefers-reduced-motion:reduce){.threshold-visual img,.threshold-visual::after,.enter,.enter::before,.enter::after{transition:none!important}}
  </style>
</head>
<body>
  <main class="entry" aria-label="Threshold entrance to Yesenia Pérez’s study">
    <picture class="threshold-visual" aria-hidden="true">
      <source srcset="assets/img-asset-threshold-9x16.png?v=threshold-elegant-glow-2026-05-17-01" media="(max-aspect-ratio: 2/3)" />
      <source srcset="assets/img-asset-threshold-3x4.png?v=threshold-elegant-glow-2026-05-17-01" media="(max-aspect-ratio: 4/5)" />
      <source srcset="assets/img-asset-threshold-1x1.png?v=threshold-elegant-glow-2026-05-17-01" media="(max-aspect-ratio: 5/4)" />
      <source srcset="assets/img-asset-threshold-4x3.png?v=threshold-elegant-glow-2026-05-17-01" media="(max-aspect-ratio: 3/2)" />
      <img src="assets/img-asset-threshold-16x9.png?v=threshold-elegant-glow-2026-05-17-01" alt="" decoding="async" fetchpriority="high" />
    </picture>

    <a class="enter" href="library.html" aria-label="Enter the study library">enter</a>
    <p class="letterhead" aria-hidden="true"><strong>Yesenia Pérez</strong><span>Public Learning Systems</span></p>
  </main>

  <script>
    (() => {
      const entry = document.querySelector('.entry');
      const enter = document.querySelector('.enter');
      const reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
      if (!entry || !enter || reduceMotion) return;
      enter.addEventListener('click', (event) => {
        event.preventDefault();
        entry.classList.add('is-entering');
        try { sessionStorage.setItem('entered-from-study', 'true'); } catch {}
        window.setTimeout(() => { window.location.href = enter.href; }, 640);
      });
    })();
  </script>
</body>
</html>
