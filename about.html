<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="build-version" content="about-image-led-2026-05-16-01" />
  <title>About · Yesenia Pérez</title>
  <meta name="description" content="Volume I of Yesenia Pérez’s public learning systems archive: the person, practice, and values behind the work." />
  <link rel="stylesheet" href="assets/css/about-book.css?v=about-image-led-2026-05-16-01" />
</head>
<body class="about-visual-page">
  <a class="skip-link" href="#about-panel-title">Skip to About content</a>

  <main class="about-scene" aria-label="Volume I: About Me">
    <img class="about-backdrop" src="./about%20page_visual.png?v=about-image-led-2026-05-16-01" alt="Open book on a warm wooden desk, showing an About Me spread with three sections." decoding="async" fetchpriority="high" />

    <nav class="about-nav" aria-label="About page navigation">
      <a class="back-link" href="library.html">Back to Library</a>
    </nav>

    <button class="section-hotspot hotspot-do" type="button" aria-controls="about-panel" aria-expanded="false" data-title="What I do" data-kicker="Practice" data-body="I design public learning and engagement systems that help institutions translate complexity into trust, participation, and access at scale. At the Space Telescope Science Institute, I work across flagship NASA astrophysics missions, national learning networks, and public engagement initiatives.">
      <span>What I do</span>
    </button>

    <button class="section-hotspot hotspot-think" type="button" aria-controls="about-panel" aria-expanded="false" data-title="How I think" data-kicker="Method" data-body="I am drawn to the layer beneath engagement: how institutions decide what counts, who moves forward, and what makes participation trustworthy. My work asks how people move through systems whose complexity exceeds ordinary visibility.">
      <span>How I think</span>
    </button>

    <button class="section-hotspot hotspot-care" type="button" aria-controls="about-panel" aria-expanded="false" data-title="What I care about" data-kicker="Values" data-body="I care about learning environments that feel usable, rigorous, culturally grounded, and alive. I care about systems that preserve dignity under scale rather than depending on insider fluency, heroic labor, or luck.">
      <span>What I care about</span>
    </button>

    <section class="about-panel" id="about-panel" aria-live="polite">
      <p class="panel-kicker" id="about-panel-kicker">Orientation Volume</p>
      <h1 id="about-panel-title">About Me</h1>
      <p id="about-panel-body">I work where science, institutions, culture, and public learning meet. My practice is about making complex systems more navigable without draining them of rigor, wonder, or humanity.</p>
      <button class="panel-close" type="button" aria-label="Close detail panel">Close</button>
    </section>

    <p class="about-signature" aria-hidden="true">Yesenia Pérez · Public Learning Systems</p>
  </main>

  <script>
    (() => {
      const body = document.body;
      const panel = document.querySelector('.about-panel');
      const panelKicker = document.querySelector('#about-panel-kicker');
      const panelTitle = document.querySelector('#about-panel-title');
      const panelBody = document.querySelector('#about-panel-body');
      const closeButton = document.querySelector('.panel-close');
      const hotspots = [...document.querySelectorAll('.section-hotspot')];
      const backLink = document.querySelector('.back-link');
      const reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

      const setPanel = (button) => {
        hotspots.forEach((item) => item.setAttribute('aria-expanded', 'false'));
        button.setAttribute('aria-expanded', 'true');
        panelKicker.textContent = button.dataset.kicker;
        panelTitle.textContent = button.dataset.title;
        panelBody.textContent = button.dataset.body;
        panel.classList.add('is-open');
      };

      hotspots.forEach((button) => {
        button.addEventListener('click', () => setPanel(button));
      });

      closeButton.addEventListener('click', () => {
        hotspots.forEach((item) => item.setAttribute('aria-expanded', 'false'));
        panel.classList.remove('is-open');
        panelKicker.textContent = 'Orientation Volume';
        panelTitle.textContent = 'About Me';
        panelBody.textContent = 'I work where science, institutions, culture, and public learning meet. My practice is about making complex systems more navigable without draining them of rigor, wonder, or humanity.';
      });

      if (backLink && !reduceMotion) {
        backLink.addEventListener('click', (event) => {
          event.preventDefault();
          body.classList.add('is-leaving');
          window.setTimeout(() => {
            window.location.href = backLink.href;
          }, 460);
        });
      }
    })();
  </script>
</body>
</html>
