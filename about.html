<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="build-version" content="about-image-led-2026-05-16-06" />
  <title>About · Yesenia Pérez</title>
  <meta name="description" content="Volume I of Yesenia Pérez’s public learning systems archive: the person, practice, and values behind the work." />
  <link rel="stylesheet" href="assets/css/about-book.css?v=about-image-led-2026-05-16-06" />
</head>
<body class="about-visual-page">
  <a class="skip-link" href="#about-panel-title">Skip to About content</a>

  <main class="about-scene" aria-label="Volume I: About Me">
    <div class="scene-frame">
      <img class="about-backdrop" src="./about-page-visual.png?v=about-image-led-2026-05-16-06" alt="" decoding="async" fetchpriority="high" />

      <button class="section-hotspot hotspot-orientation" type="button" aria-label="Open key note" aria-controls="about-panel" aria-expanded="true" data-mode="orientation" data-title="Key" data-kicker="Reading note" data-body="Left page: why. Right page: how. The spread moves from purpose into practice, method, and values.">
        <span>About Me</span>
      </button>

      <button class="section-hotspot hotspot-do" type="button" aria-label="Open practice note" aria-controls="about-panel" aria-expanded="false" data-mode="practice" data-title="Practice" data-kicker="What I do" data-body="Turning complex science and institutional work into public learning systems people can use, trust, and enter.">
        <span>What I do</span>
      </button>

      <button class="section-hotspot hotspot-think" type="button" aria-label="Open method note" aria-controls="about-panel" aria-expanded="false" data-mode="method" data-title="Method" data-kicker="How I think" data-body="Looking beneath engagement to the rules, relationships, and recognition structures that shape who can move forward.">
        <span>How I think</span>
      </button>

      <button class="section-hotspot hotspot-care" type="button" aria-label="Open values note" aria-controls="about-panel" aria-expanded="false" data-mode="values" data-title="Values" data-kicker="What I care about" data-body="Designing learning environments that stay rigorous, culturally grounded, humane, and alive without relying on insider fluency or luck.">
        <span>What I care about</span>
      </button>
    </div>

    <nav class="about-nav" aria-label="About page navigation">
      <a class="back-link" href="library.html">Back to Library</a>
    </nav>

    <section class="about-panel is-open" id="about-panel" data-mode="orientation" aria-live="polite" aria-labelledby="about-panel-title">
      <p class="panel-kicker" id="about-panel-kicker">Reading note</p>
      <h1 id="about-panel-title">Key</h1>
      <p id="about-panel-body">Left page: why. Right page: how. The spread moves from purpose into practice, method, and values.</p>
      <button class="panel-close" type="button" aria-label="Close detail panel">Close</button>
    </section>

    <p class="about-signature" aria-hidden="true">Yesenia Pérez · Public Learning Systems</p>
  </main>

  <script>
    (() => {
      const body = document.body;
      const panel = document.querySelector('.about-panel');
      const panelKicker = document.querySelector('#about-panel-kicker');
      const panelTitle = document.querySelector('#about-panel-title');
      const panelBody = document.querySelector('#about-panel-body');
      const closeButton = document.querySelector('.panel-close');
      const hotspots = [...document.querySelectorAll('.section-hotspot')];
      const backLink = document.querySelector('.back-link');
      const reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

      if (!panel || !panelKicker || !panelTitle || !panelBody || !closeButton) return;

      const getSessionFlag = (key) => {
        try {
          return sessionStorage.getItem(key) === 'true';
        } catch {
          return false;
        }
      };

      const removeSessionFlag = (key) => {
        try {
          sessionStorage.removeItem(key);
        } catch {
          /* Storage may be unavailable in some private browsing contexts. */
        }
      };

      if (getSessionFlag('entered-from-library-about') && !reduceMotion) {
        body.classList.add('is-arriving-from-library');
        removeSessionFlag('entered-from-library-about');
        window.requestAnimationFrame(() => {
          window.requestAnimationFrame(() => body.classList.remove('is-arriving-from-library'));
        });
      }

      const resetHotspots = () => {
        hotspots.forEach((item) => item.setAttribute('aria-expanded', 'false'));
      };

      const setPanel = (button) => {
        resetHotspots();
        button.setAttribute('aria-expanded', 'true');
        panel.dataset.mode = button.dataset.mode || 'note';
        panelKicker.textContent = button.dataset.kicker || '';
        panelTitle.textContent = button.dataset.title || '';
        panelBody.textContent = button.dataset.body || '';
        panel.classList.add('is-open');
      };

      const closePanel = () => {
        resetHotspots();
        panel.classList.remove('is-open');
      };

      hotspots.forEach((button) => {
        button.addEventListener('click', () => setPanel(button));
      });

      closeButton.addEventListener('click', closePanel);

      window.addEventListener('keydown', (event) => {
        if (event.key === 'Escape' && panel.classList.contains('is-open')) closePanel();
      });

      if (backLink && !reduceMotion) {
        backLink.addEventListener('click', (event) => {
          event.preventDefault();
          body.classList.add('is-leaving');
          window.setTimeout(() => {
            window.location.href = backLink.href;
          }, 460);
        });
      }
    })();
  </script>
</body>
</html>
