<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="build-version" content="repo-cleanup-2026-05-17-01" />
  <title>About · Yesenia Pérez</title>
  <meta name="description" content="Volume I of Yesenia Pérez’s public learning systems archive: the person, practice, and values behind the work." />
  <link rel="stylesheet" href="assets/css/about-book.css?v=repo-cleanup-2026-05-17-01" />
</head>
<body class="about-visual-page">
  <main class="about-scene" aria-label="Volume I: About Me">
    <picture class="about-backdrop" aria-hidden="true">
      <source srcset="assets/img-asset-about-9x16.png?v=repo-cleanup-2026-05-17-01" media="(max-aspect-ratio: 2/3)" />
      <source srcset="assets/img-asset-about-3x4.png?v=repo-cleanup-2026-05-17-01" media="(max-aspect-ratio: 4/5)" />
      <source srcset="assets/img-asset-about-1x1.png?v=repo-cleanup-2026-05-17-01" media="(max-aspect-ratio: 5/4)" />
      <source srcset="assets/img-asset-about-4x3.png?v=repo-cleanup-2026-05-17-01" media="(max-aspect-ratio: 3/2)" />
      <img src="assets/img-asset-about-16x9.png?v=repo-cleanup-2026-05-17-01" alt="" decoding="async" fetchpriority="high" />
    </picture>

    <nav class="about-nav" aria-label="About page navigation">
      <a class="back-link" href="library.html" aria-label="Back to library">library</a>
    </nav>
  </main>

  <script>
    (() => {
      const body = document.body;
      const backLink = document.querySelector('.back-link');
      const reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
      const safely = (fn) => { try { return fn(); } catch { return null; } };

      if (safely(() => sessionStorage.getItem('entered-from-library-about')) === 'true' && !reduceMotion) {
        body.classList.add('is-arriving-from-library');
        safely(() => sessionStorage.removeItem('entered-from-library-about'));
        window.requestAnimationFrame(() => {
          window.requestAnimationFrame(() => body.classList.remove('is-arriving-from-library'));
        });
      }

      if (backLink && !reduceMotion) {
        backLink.addEventListener('click', (event) => {
          event.preventDefault();
          body.classList.add('is-leaving');
          window.setTimeout(() => { window.location.href = backLink.href; }, 420);
        });
      }
    })();
  </script>
</body>
</html>
